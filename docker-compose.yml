version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Conexão com o Data Warehouse (PostgreSQL do projeto)
    OLIST_DW_CONN: postgresql+psycopg2://olist:olist2024@postgres-dw:5432/olist_dw
    # Conexão com LocalStack (simula AWS S3) — referência de arquitetura
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_DEFAULT_REGION: us-east-1
    LOCALSTACK_ENDPOINT: http://localstack:4566
    # Bucket do Data Lake
    S3_BUCKET: olist-data-lake
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      kagglehub
      pyspark==3.5.0
      pandas
      sqlalchemy
      psycopg2-binary
      boto3
      pyarrow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres-dw:
      condition: service_healthy

services:

  # ─────────────────────────────────────────
  # PostgreSQL — Metadados do Airflow
  # ─────────────────────────────────────────
  postgres-airflow:
    image: postgres:15
    container_name: olist_postgres_airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # PostgreSQL — Data Warehouse do projeto
  # ─────────────────────────────────────────
  postgres-dw:
    image: postgres:15
    container_name: olist_postgres_dw
    environment:
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist2024
      POSTGRES_DB: olist_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
      - ./scripts/init_dw.sql:/docker-entrypoint-initdb.d/init_dw.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "olist", "-d", "olist_dw"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # LocalStack — Simula AWS S3 (Data Lake)
  # Referência de arquitetura — pipeline usa volume local
  # ─────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.0
    container_name: olist_localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 0
      DATA_DIR: /tmp/localstack/data
      LOCALSTACK_HOST: localstack
    volumes:
      - localstack_data:/tmp/localstack
      - ./scripts/init_s3.sh:/etc/localstack/init/ready.d/init_s3.sh
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Airflow — Init (roda uma vez)
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: olist_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Vinicius \
          --lastname Siqueira \
          --role Admin \
          --email admin@olist.local \
          --password admin
        echo "✅ Airflow inicializado"
    restart: on-failure

  # ─────────────────────────────────────────
  # Airflow — Scheduler
  # ─────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: olist_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # Airflow — Webserver
  # ─────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: olist_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # Dashboard Streamlit
  # ─────────────────────────────────────────
  streamlit:
    image: python:3.11-slim
    container_name: olist_streamlit
    working_dir: /app
    volumes:
      - ./dashboard:/app
      - ./scripts/exports:/app/data  # ← CSVs gerados pelo pipeline alimentam o dashboard
    ports:
      - "8501:8501"
    environment:
      OLIST_DW_CONN: postgresql+psycopg2://olist:olist2024@postgres-dw:5432/olist_dw
      DATA_DIR: /app/data
    command: >
      bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary -q &&
               streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    depends_on:
      postgres-dw:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_airflow_data:
  postgres_dw_data:
  localstack_data:
